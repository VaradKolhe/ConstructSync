version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: constructsync-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - constructsync-net

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    restart: always
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://mongodb:27017/constructsync_db
      - JWT_SECRET=constructsync_secret_key_2026
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - constructsync-net

  labour-service:
    build:
      context: ./backend
      dockerfile: labour-service/Dockerfile
    container_name: labour-service
    restart: always
    environment:
      - PORT=5002
      - MONGO_URI=mongodb://mongodb:27017/constructsync_db
      - JWT_SECRET=constructsync_secret_key_2026
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - constructsync-net

  attendance-service:
    build:
      context: ./backend
      dockerfile: attendance-service/Dockerfile
    container_name: attendance-service
    restart: always
    environment:
      - PORT=5003
      - MONGO_URI=mongodb://mongodb:27017/constructsync_db
      - JWT_SECRET=constructsync_secret_key_2026
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - constructsync-net

  deployment-service:
    build:
      context: ./backend
      dockerfile: deployment-service/Dockerfile
    container_name: deployment-service
    restart: always
    environment:
      - PORT=5004
      - MONGO_URI=mongodb://mongodb:27017/constructsync_db
      - JWT_SECRET=constructsync_secret_key_2026
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - constructsync-net

  reporting-service:
    build:
      context: ./backend
      dockerfile: reporting-service/Dockerfile
    container_name: reporting-service
    restart: always
    environment:
      - PORT=5005
      - MONGO_URI=mongodb://mongodb:27017/constructsync_db
      - JWT_SECRET=constructsync_secret_key_2026
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - constructsync-net

  gateway:
    build:
      context: ./backend
      dockerfile: gateway/Dockerfile
    container_name: gateway
    restart: always
    environment:
      - PORT=5000
      - AUTH_SERVICE_URL=http://auth-service:5001
      - LABOUR_SERVICE_URL=http://labour-service:5002
      - ATTENDANCE_SERVICE_URL=http://attendance-service:5003
      - DEPLOYMENT_SERVICE_URL=http://deployment-service:5004
      - REPORTING_SERVICE_URL=http://reporting-service:5005
      - NODE_ENV=production
    depends_on:
      - auth-service
      - labour-service
      - attendance-service
      - deployment-service
      - reporting-service
    networks:
      - constructsync-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - constructsync-net

networks:
  constructsync-net:
    driver: bridge

volumes:
  mongo-data:
