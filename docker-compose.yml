version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: constructsync-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - constructsync-network

  auth-service:
    build:
      context: .
      target: auth-service
    container_name: auth-service
    restart: always
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://mongodb:27017/constructsync_db
      - JWT_SECRET=constructsync_secret_key_2026
      - NODE_ENV=development
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - constructsync-network

  labour-service:
    build:
      context: .
      target: labour-service
    container_name: labour-service
    restart: always
    environment:
      - PORT=5002
      - MONGO_URI=mongodb://mongodb:27017/constructsync_db
      - JWT_SECRET=constructsync_secret_key_2026
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - constructsync-network

  attendance-service:
    build:
      context: .
      target: attendance-service
    container_name: attendance-service
    restart: always
    environment:
      - PORT=5003
      - MONGO_URI=mongodb://mongodb:27017/constructsync_db
      - JWT_SECRET=constructsync_secret_key_2026
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - constructsync-network

  deployment-service:
    build:
      context: .
      target: deployment-service
    container_name: deployment-service
    restart: always
    environment:
      - PORT=5004
      - MONGO_URI=mongodb://mongodb:27017/constructsync_db
      - JWT_SECRET=constructsync_secret_key_2026
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - constructsync-network

  reporting-service:
    build:
      context: .
      target: reporting-service
    container_name: reporting-service
    restart: always
    environment:
      - PORT=5005
      - MONGO_URI=mongodb://mongodb:27017/constructsync_db
      - JWT_SECRET=constructsync_secret_key_2026
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - constructsync-network

  gateway:
    build:
      context: .
      target: gateway
    container_name: gateway
    restart: always
    environment:
      - PORT=5000
      - AUTH_SERVICE_URL=http://auth-service:5001
      - LABOUR_SERVICE_URL=http://labour-service:5002
      - ATTENDANCE_SERVICE_URL=http://attendance-service:5003
      - DEPLOYMENT_SERVICE_URL=http://deployment-service:5004
      - REPORTING_SERVICE_URL=http://reporting-service:5005
    depends_on:
      - auth-service
      - labour-service
      - attendance-service
      - deployment-service
      - reporting-service
    networks:
      - constructsync-network

  frontend:
    build:
      context: .
      target: frontend
    container_name: frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway
    networks:
      - constructsync-network

networks:
  constructsync-network:
    driver: bridge

volumes:
  mongo-data:
