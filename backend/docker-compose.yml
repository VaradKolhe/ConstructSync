version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: constructsync-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - constructsync-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://mongodb:27017/constructsync_db
      - JWT_SECRET=constructsync_secret_key_2026
      - NODE_ENV=development
    depends_on:
      - mongodb
    networks:
      - constructsync-network

  labour-service:
    build:
      context: .
      dockerfile: labour-service/Dockerfile
    container_name: labour-service
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - MONGO_URI=mongodb://mongodb:27017/constructsync_db
    depends_on:
      - mongodb
    networks:
      - constructsync-network

  attendance-service:
    build:
      context: .
      dockerfile: attendance-service/Dockerfile
    container_name: attendance-service
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - MONGO_URI=mongodb://mongodb:27017/constructsync_db
    depends_on:
      - mongodb
    networks:
      - constructsync-network

  deployment-service:
    build:
      context: .
      dockerfile: deployment-service/Dockerfile
    container_name: deployment-service
    ports:
      - "5004:5004"
    environment:
      - PORT=5004
      - MONGO_URI=mongodb://mongodb:27017/constructsync_db
    depends_on:
      - mongodb
    networks:
      - constructsync-network

  reporting-service:
    build:
      context: .
      dockerfile: reporting-service/Dockerfile
    container_name: reporting-service
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
      - MONGO_URI=mongodb://mongodb:27017/constructsync_db
    depends_on:
      - mongodb
    networks:
      - constructsync-network

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: gateway
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - AUTH_SERVICE_URL=http://auth-service:5001
      - LABOUR_SERVICE_URL=http://labour-service:5002
      - ATTENDANCE_SERVICE_URL=http://attendance-service:5003
      - DEPLOYMENT_SERVICE_URL=http://deployment-service:5004
      - REPORTING_SERVICE_URL=http://reporting-service:5005
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - auth-service
      - labour-service
      - attendance-service
      - deployment-service
      - reporting-service
    networks:
      - constructsync-network

networks:
  constructsync-network:
    driver: bridge

volumes:
  mongo-data:
